---
# Read-only health check across all towers.
# Outputs a clean per-tower report and a fleet summary table at the end.
#
# Ping src-address resolution order:
#   1. PPPoE profile local-address (tests iBGP return path)
#   2. MGT_Bridge ip address       (fallback — tests basic reachability)
#   3. Skip ping entirely          (neither found)
#
# Usage:
#   ansible-playbook -i inventory_testing.ini check_bgp_health.yml --ask-pass
#   ansible-playbook -i inventory_testing.ini check_bgp_health.yml --limit tower-site-a

- name: Check BGP health on MikroTik towers
  hosts: routers
  gather_facts: false

  vars:
    bgp_ping_target: "10.0.0.1"
    bgp_pppoe_profile: "print"

  tasks:
    # --- Data collection ---

    - name: Get BGP session state
      community.routeros.command:
        commands:
          - ":foreach s in=[/routing bgp session find] do={ :put ([/routing bgp session get $s name] . \" | established=\" . [/routing bgp session get $s established] . \" | uptime=\" . [/routing bgp session get $s uptime]) }"
      register: bgp_sessions
      ignore_errors: true

    - name: Get BGP connection config via API
      community.routeros.api_info:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_ssh_pass }}"
        path: routing bgp connection
      register: bgp_connections

    - name: Get PPP profiles via API
      community.routeros.api_info:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_ssh_pass }}"
        path: ppp profile
        hide_defaults: false
      register: ppp_profiles

    - name: Get IP addresses via API
      community.routeros.api_info:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_ssh_pass }}"
        path: ip address
      register: ip_addresses

    - name: Get watchdog failure counter
      community.routeros.command:
        commands:
          - ":global bgpWatchdogFailCount; :put $bgpWatchdogFailCount"
      register: watchdog_counter
      ignore_errors: true

    # --- Resolve ping source address ---

    - name: Resolve ping source address
      vars:
        _ppp_addr: >-
          {{ (ppp_profiles.result | default([])
              | selectattr('name', 'equalto', bgp_pppoe_profile)
              | list | first | default({})).get('local-address', '') }}
        _mgt_addr_cidr: >-
          {{ (ip_addresses.result | default([])
              | selectattr('interface', 'equalto', 'MGT_Bridge')
              | list | first | default({})).get('address', '') }}
      set_fact:
        fact_ppp_local_addr:  "{{ _ppp_addr or 'NOT FOUND' }}"
        fact_ppp_all_names:   "{{ ppp_profiles.result | default([]) | map(attribute='name') | list }}"
        fact_mgt_addr:        "{{ _mgt_addr_cidr | regex_replace('/\\d+$', '') or 'NOT FOUND' }}"
        fact_ping_src:        "{{ _ppp_addr if _ppp_addr else (_mgt_addr_cidr | regex_replace('/\\d+$', '')) }}"
        fact_ping_src_type:   "{{ 'PPPoE profile' if _ppp_addr else ('MGT_Bridge (fallback)' if _mgt_addr_cidr else 'none') }}"

    # --- Ping test with resolved src-address ---

    - name: Run ping test
      community.routeros.command:
        commands:
          - ":put [/ping address={{ bgp_ping_target }} src-address={{ fact_ping_src }} count=3]"
      register: ping_result
      when: fact_ping_src != ''
      ignore_errors: true

    # --- Extract remaining facts ---

    - name: Extract and evaluate facts
      vars:
        _sessions_raw: "{{ bgp_sessions.stdout[0] | default('') }}"
        _ping_raw:     "{{ ping_result.stdout[0] | default('') }}"
        _counter_raw:  "{{ watchdog_counter.stdout[0] | default('') }}"
        _clean_conns:  "{{ bgp_connections.result | default([]) | map('dict2items') | map('selectattr', 'key', 'match', '^[^!.]') | map('list') | map('items2dict') | list }}"
      set_fact:
        fact_bgp_sessions:    "{{ _sessions_raw | regex_findall('(?m)^[A-Za-z0-9][^\n]*established=[^\n]*') }}"
        fact_bgp_connections: "{{ _clean_conns }}"
        fact_ping_replies:    "{{ _ping_raw | regex_findall('(?m)^[0-9]+$') | first | default('0') }}"
        fact_watchdog:        "{{ _counter_raw | trim or '0' }}"

    - name: Set health status
      set_fact:
        fact_status: >-
          {{ 'NO_SRC'
             if (fact_ping_src == '')
             else ('STALLED'
                   if (fact_ping_replies | int == 0)
                   else ('WARNING'
                         if (fact_bgp_sessions | select('search', 'established=false') | list | length > 0
                             or fact_bgp_sessions | length == 0)
                         else 'HEALTHY')) }}

    - name: Tower report
      debug:
        msg: "{{ lookup('template', 'templates/tower_report.j2') }}"

    - name: Fleet summary
      run_once: true
      debug:
        msg: "{{ lookup('template', 'templates/fleet_summary.j2') }}"
